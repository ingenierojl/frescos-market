<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel de administrador — Frescos Market</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<link rel="preconnect" href="https://api.fontshare.com">
<link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=switzer@400,500,600,700,800&display=swap">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="auth.js" defer></script>
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <a href="index.html" class="brand">
      <svg class="brand-mark" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <circle cx="16" cy="16" r="16" fill="var(--primary)"/>
        <path d="M10 18c0-4.5 3.5-8 8-8 0 4.5-3.5 8-8 8z" fill="var(--accent)"/>
        <path d="M10 18c3 0 5.5 2 6 5" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      <span class="brand-name">Frescos<strong>Market</strong></span>
    </a>
    <div class="auth-area" id="authArea"></div>
  </div>
</header>

<main class="admin-main">
  <h1 class="admin-title">Panel de administrador</h1>

  <div id="adminState" class="admin-state">Cargando…</div>

  <nav class="admin-tabs" id="adminTabs" hidden>
    <button class="admin-tab active" data-tab="orders">Pedidos</button>
    <button class="admin-tab" data-tab="products">Productos</button>
    <button class="admin-tab" data-tab="settings" id="settingsTabBtn" hidden>Configuración</button>
  </nav>

  <section id="ordersTab" class="admin-tab-panel">
    <div id="ordersList" class="orders-list"></div>
  </section>

  <section id="productsTab" class="admin-tab-panel" hidden>
    <button class="btn-outline" id="addProductBtn">+ Agregar producto</button>
    <div id="productsList" class="products-admin-list"></div>
  </section>

  <section id="settingsTab" class="admin-tab-panel" hidden>
    <form id="settingsForm" class="order-info-form">
      <label>
        Chat de Telegram para avisos de pedido nuevo
        <input type="text" id="telegramChatId" placeholder="Ej: 123456789">
      </label>
      <p class="settings-hint">Es el chat_id que te da el bot, no tu número de teléfono. Déjalo vacío para no recibir avisos.</p>
      <button type="submit" class="btn-primary-block">Guardar</button>
    </form>
    <p id="settingsSaved" class="settings-saved" hidden>Guardado ✓</p>
  </section>
</main>

<div class="login-modal-overlay" id="productModal">
  <div class="login-modal product-form-modal">
    <button class="login-modal-close" id="productModalClose" aria-label="Cerrar">✕</button>
    <h2 id="productModalTitle">Agregar producto</h2>
    <form id="productForm" class="order-info-form">
      <input type="hidden" id="productId">
      <label>
        Slug (identificador único, sin espacios)
        <input type="text" id="productSlug" required>
      </label>
      <label>
        Nombre
        <input type="text" id="productName" required>
      </label>
      <label>
        Unidad
        <select id="productUnit">
          <option value="por libra">Por libra</option>
          <option value="por kilo">Por kilo</option>
          <option value="por unidad">Por unidad</option>
          <option value="atado">Atado</option>
          <option value="bandeja">Bandeja</option>
          <option value="canasta">Canasta</option>
        </select>
      </label>
      <label>
        Precio (COP)
        <input type="number" id="productPrice" min="0" required>
      </label>
      <label>
        Categoría
        <select id="productCategory">
          <option value="hortalizas">Hortalizas</option>
          <option value="frutas">Frutas</option>
        </select>
      </label>
      <label>
        Foto (o tómala directo con la cámara del celular)
        <input type="file" id="productPhoto" accept="image/*">
        <input type="hidden" id="productPhotoUrl">
      </label>
      <img id="productPhotoPreview" class="product-photo-preview" hidden alt="Vista previa">
      <p id="productPhotoStatus" class="settings-hint" hidden></p>
      <label>
        Stock (vacío = sin control de stock)
        <input type="number" id="productStock" min="0">
      </label>
      <label class="product-active-label">
        <input type="checkbox" id="productActive" checked>
        Activo (visible en el catálogo)
      </label>
      <button type="submit" class="btn-primary-block">Guardar</button>
    </form>
  </div>
</div>

<script src="panel.js" defer></script>
</body>
</html>
